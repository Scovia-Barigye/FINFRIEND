<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thread – FinFriend Forum</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <nav class="navbar">
    <div class="container">
      <a href="/" class="navbar-brand">
        <div class="brand-icon">💰</div>
        Fin<span class="brand-accent">Friend</span>
      </a>
      <button class="hamburger" id="hamburger" aria-label="Menu"><span></span><span></span><span></span></button>
      <div class="navbar-links" id="navLinks">
        <a href="/modules">Modules</a>
        <a href="/tools">Tools</a>
        <a href="/forum" class="active">Community</a>
        <a href="/blog">Blog</a>
        <a href="/leaderboard">Leaderboard</a>
      </div>
      <div class="navbar-auth" id="navAuth"></div>
    </div>
  </nav>

  <section class="section" style="padding-top: 2rem;">
    <div class="container" style="max-width: 800px;">
      <a href="/forum" class="btn btn-ghost btn-sm mb-2">← Back to Forum</a>

      <div id="threadContent">
        <p class="text-muted">Loading thread...</p>
      </div>

      <!-- Replies -->
      <div id="repliesList" class="mt-3"></div>

      <!-- Reply Form -->
      <div class="dash-panel mt-3" id="replySection">
        <h4 class="mb-2">💬 Post a Reply</h4>
        <form id="replyForm">
          <div class="form-group">
            <textarea id="replyBody" class="form-control" rows="4" placeholder="Share your thoughts..." required></textarea>
          </div>
          <button type="submit" class="btn btn-primary">Post Reply</button>
        </form>
      </div>
    </div>
  </section>

  <footer class="footer">
    <div class="container">
      <div class="footer-bottom">
        <p>&copy; 2026 FinFriend. Made with ❤️ in Uganda.</p>
      </div>
    </div>
  </footer>

  <div class="toast-container" id="toastContainer"></div>
  <script src="/js/app.js"></script>
  <script>
    const threadId = new URLSearchParams(window.location.search).get('id');

    async function loadThread() {
      if (!threadId) return;
      const res = await fetch(`/api/forum/threads/${threadId}`);
      if (!res.ok) {
        document.getElementById('threadContent').innerHTML = '<p class="text-muted">Thread not found.</p>';
        return;
      }

      const t = await res.json();
      document.title = `${t.title} – FinFriend Forum`;

      document.getElementById('threadContent').innerHTML = `
        <div class="dash-panel">
          <span class="badge badge-category mb-1">${t.category_name}</span>
          <h2 style="margin-bottom: 0.5rem;">${t.title}</h2>
          <div class="thread-meta mb-2">
            <span>By <strong>${t.author}</strong></span>
            <span>👁 ${t.views} views</span>
            <span>${new Date(t.created_at).toLocaleDateString('en-UG', { year: 'numeric', month: 'long', day: 'numeric' })}</span>
          </div>
          <p style="font-size: 1rem; line-height: 1.7;">${t.body}</p>
        </div>
      `;

      // Replies
      const repliesDiv = document.getElementById('repliesList');
      if (t.replies && t.replies.length) {
        repliesDiv.innerHTML = `<h3 class="mb-2">💬 ${t.replies.length} Replies</h3>` +
          t.replies.map(r => `
            <div class="dash-panel" style="margin-bottom: 0.75rem;">
              <div style="display: flex; align-items: center; gap: 0.75rem; margin-bottom: 0.5rem;">
                <div style="width: 36px; height: 36px; border-radius: 50%; background: var(--primary-light); display: flex; align-items: center; justify-content: center; font-weight: 700; color: var(--primary);">${r.author.charAt(0)}</div>
                <div>
                  <strong>${r.author}</strong>
                  <div class="text-sm text-muted">${new Date(r.created_at).toLocaleDateString('en-UG', { year: 'numeric', month: 'short', day: 'numeric' })}</div>
                </div>
              </div>
              <p>${r.body}</p>
            </div>
          `).join('');
      } else {
        repliesDiv.innerHTML = '<p class="text-muted">No replies yet. Be the first!</p>';
      }
    }

    document.getElementById('replyForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const token = localStorage.getItem('ff_token');
      if (!token) { showToast('Please log in to reply.', 'error'); return; }

      const body = document.getElementById('replyBody').value;
      const res = await apiFetch(`/api/forum/threads/${threadId}/reply`, {
        method: 'POST',
        body: JSON.stringify({ body })
      });

      if (res.ok) {
        showToast('Reply posted! +2 XP', 'success');
        document.getElementById('replyBody').value = '';
        loadThread();
      } else {
        showToast('Failed to post reply.', 'error');
      }
    });

    loadThread();
  </script>
</body>
</html>
