<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Log In – FinFriend</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="auth-container">
    <div class="auth-card">
      <a href="/" class="auth-logo">
        <div class="brand-icon">💰</div>
        Fin<span class="brand-accent">Friend</span>
      </a>
      <h2>Welcome Back 👋</h2>
      <p class="subtitle">Log in to continue your financial journey</p>

      <div id="loginAlert"></div>

      <form id="loginForm">
        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" class="form-control" placeholder="you@university.ac.ug" required>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" class="form-control" placeholder="Enter your password" required>
        </div>
        <button type="submit" class="btn btn-primary btn-block btn-lg">Log In →</button>
      </form>

      <div class="auth-divider">Don't have an account?</div>
      <a href="/register" class="btn btn-outline btn-block">Create Free Account</a>
    </div>
  </div>

  <div class="toast-container" id="toastContainer"></div>
  <script src="/js/app.js"></script>
  <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email    = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const alertBox = document.getElementById('loginAlert');
      try {
        const res  = await fetch('/api/auth/login', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({email,password}) });
        const data = await res.json();
        if (!res.ok) { alertBox.innerHTML=`<div class="alert alert-danger">${data.error}</div>`; return; }
        localStorage.setItem('ff_token', data.token);
        localStorage.setItem('ff_user', JSON.stringify(data.user));
        showToast('Login successful!', 'success');
        setTimeout(() => window.location.href = '/dashboard', 500);
      } catch { alertBox.innerHTML='<div class="alert alert-danger">Connection error. Please try again.</div>'; }
    });
  </script>
</body>
</html>
