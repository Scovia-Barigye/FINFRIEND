<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Leaderboard – FinFriend</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <nav class="navbar">
    <div class="container">
      <a href="/" class="navbar-brand">
        <div class="brand-icon">💰</div>
        Fin<span class="brand-accent">Friend</span>
      </a>
      <button class="hamburger" id="hamburger" aria-label="Menu"><span></span><span></span><span></span></button>
      <div class="navbar-links" id="navLinks">
        <a href="/modules">Modules</a>
        <a href="/tools">Tools</a>
        <a href="/forum">Community</a>
        <a href="/blog">Blog</a>
        <a href="/leaderboard" class="active">Leaderboard</a>
      </div>
      <div class="navbar-auth" id="navAuth"></div>
    </div>
  </nav>
  <section class="page-hero">
    <div class="container">
      <h1>🏆 Leaderboard</h1>
      <p>Top students ranked by XP earned through modules, quizzes, and community participation.</p>
    </div>
  </section>

  <section class="section">
    <div class="container" style="max-width:720px;">
      <div id="leaderboardList"><p class="text-muted">Loading…</p></div>
    </div>
  </section>

  <footer class="footer">
    <div class="container">
      <div class="footer-bottom">
        <p>&copy; 2026 FinFriend. Made with ❤️ in Uganda.</p>
      </div>
    </div>
  </footer>

  <div class="toast-container" id="toastContainer"></div>
  <script src="/js/app.js"></script>
  <script>
    async function loadLeaderboard() {
      const res = await fetch('/api/users/leaderboard');
      const users = await res.json();
      const list = document.getElementById('leaderboardList');
      if (!users.length) {
        list.innerHTML = '<div class="empty-state"><div class="empty-state-icon">🏆</div><p>No users yet. Be the first to join!</p></div>';
        return;
      }
      list.innerHTML = users.map((u, i) => {
        const topClass  = i===0?'top-1':i===1?'top-2':i===2?'top-3':'';
        const rankClass = i===0?'gold':i===1?'silver':i===2?'bronze':'other';
        const medal     = i===0?'🥇':i===1?'🥈':i===2?'🥉':`#${i+1}`;
        return `
          <div class="leaderboard-item ${topClass}">
            <div class="leaderboard-rank ${rankClass}">${medal}</div>
            <div class="leaderboard-avatar">${u.full_name.charAt(0).toUpperCase()}</div>
            <div class="leaderboard-info">
              <h4>${u.full_name}</h4>
              <small>${u.university || 'University not set'}</small>
            </div>
            <div class="leaderboard-xp">⭐ ${u.xp} XP</div>
          </div>`;
      }).join('');
    }
    loadLeaderboard();
  </script>
</body>
</html>
