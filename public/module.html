<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Module – FinFriend</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <nav class="navbar">
    <div class="container">
      <a href="/" class="navbar-brand">
        <div class="brand-icon">💰</div>
        Fin<span class="brand-accent">Friend</span>
      </a>
      <button class="hamburger" id="hamburger" aria-label="Menu"><span></span><span></span><span></span></button>
      <div class="navbar-links" id="navLinks">
        <a href="/modules" class="active">Modules</a>
        <a href="/tools">Tools</a>
        <a href="/forum">Community</a>
        <a href="/blog">Blog</a>
        <a href="/leaderboard">Leaderboard</a>
      </div>
      <div class="navbar-auth" id="navAuth"></div>
    </div>
  </nav>

  <section class="section" style="padding-top: 2rem;">
    <div class="container">
      <a href="/modules" class="btn btn-ghost btn-sm mb-2">← Back to Modules</a>

      <div id="moduleContent" class="module-content">
        <p class="text-muted">Loading module...</p>
      </div>

      <!-- Quiz Section -->
      <div id="quizSection" class="mt-4 hidden" style="max-width: 800px; margin: 2rem auto 0;">
        <h2 class="mb-2">📝 Quiz Time!</h2>
        <p class="text-muted mb-3">Test your understanding. You need 60% to pass and earn XP.</p>
        <div id="quizQuestions"></div>
        <button class="btn btn-accent btn-lg btn-block mt-2" id="submitQuiz" onclick="submitQuiz()">Submit Answers</button>
        <div id="quizResult" class="mt-2 hidden"></div>
      </div>
    </div>
  </section>

  <footer class="footer">
    <div class="container">
      <div class="footer-bottom">
        <p>&copy; 2026 FinFriend. Made with ❤️ in Uganda.</p>
      </div>
    </div>
  </footer>

  <div class="toast-container" id="toastContainer"></div>
  <script src="/js/app.js"></script>
  <script>
    let currentSlug = '';
    let quizData = [];

    async function loadModule() {
      const params = new URLSearchParams(window.location.search);
      currentSlug = params.get('slug');
      if (!currentSlug) {
        document.getElementById('moduleContent').innerHTML = '<p class="text-muted">Module not found.</p>';
        return;
      }

      const res = await fetch(`/api/modules/${currentSlug}`);
      if (!res.ok) {
        document.getElementById('moduleContent').innerHTML = '<p class="text-muted">Module not found.</p>';
        return;
      }

      const mod = await res.json();
      document.title = `${mod.title} – FinFriend`;

      document.getElementById('moduleContent').innerHTML = `
        <div style="display: flex; gap: 0.5rem; margin-bottom: 1rem;">
          <span class="badge badge-primary">${mod.category}</span>
          <span class="badge badge-accent">${mod.difficulty}</span>
          <span class="badge badge-warning">⭐ ${mod.xp_reward} XP</span>
        </div>
        <h1 style="font-size: 2rem; margin-bottom: 1rem;">${mod.title}</h1>
        <p style="font-size: 1.05rem; color: var(--gray-500); margin-bottom: 2rem;">${mod.description}</p>
        <hr style="border: none; border-top: 1px solid var(--gray-300); margin-bottom: 2rem;">
        ${mod.content_html}
        ${mod.video_url ? `<div class="mt-3"><h3>🎬 Watch the Video</h3><div style="position:relative;padding-bottom:56.25%;height:0;overflow:hidden;border-radius:var(--radius);margin-top:1rem;"><iframe src="${mod.video_url}" style="position:absolute;top:0;left:0;width:100%;height:100%;" frameborder="0" allowfullscreen></iframe></div></div>` : ''}
        <div class="mt-4 text-center">
          <button class="btn btn-primary btn-lg" onclick="showQuiz()">Take the Quiz →</button>
          <button class="btn btn-outline btn-lg" onclick="markComplete()">Mark as Complete</button>
        </div>
      `;

      // Pre-load quiz
      const quizRes = await fetch(`/api/modules/${currentSlug}/quiz`);
      quizData = await quizRes.json();
    }

    function showQuiz() {
      if (!quizData.length) {
        showToast('No quiz available for this module.', 'info');
        return;
      }
      const section = document.getElementById('quizSection');
      section.classList.remove('hidden');
      section.scrollIntoView({ behavior: 'smooth' });

      document.getElementById('quizQuestions').innerHTML = quizData.map((q, i) => `
        <div class="quiz-question">
          <h4>Question ${i + 1}: ${q.question}</h4>
          <div class="quiz-options">
            <label><input type="radio" name="q${q.id}" value="a"> ${q.option_a}</label>
            <label><input type="radio" name="q${q.id}" value="b"> ${q.option_b}</label>
            <label><input type="radio" name="q${q.id}" value="c"> ${q.option_c}</label>
            <label><input type="radio" name="q${q.id}" value="d"> ${q.option_d}</label>
          </div>
        </div>
      `).join('');
    }

    async function submitQuiz() {
      const token = localStorage.getItem('ff_token');
      if (!token) { showToast('Please log in to submit the quiz.', 'error'); return; }

      const answers = {};
      quizData.forEach(q => {
        const selected = document.querySelector(`input[name="q${q.id}"]:checked`);
        if (selected) answers[q.id] = selected.value;
      });

      if (Object.keys(answers).length < quizData.length) {
        showToast('Please answer all questions.', 'error');
        return;
      }

      const res = await apiFetch(`/api/modules/${currentSlug}/quiz`, {
        method: 'POST',
        body: JSON.stringify({ answers })
      });
      const data = await res.json();

      const resultDiv = document.getElementById('quizResult');
      resultDiv.classList.remove('hidden');
      resultDiv.innerHTML = `
        <div class="quiz-result ${data.passed ? 'passed' : 'failed'}">
          <h3>${data.passed ? '🎉 Congratulations!' : '😔 Not quite...'}</h3>
          <p>You scored <strong>${data.score}/${data.total}</strong> (${data.percentage}%)</p>
          <p>${data.passed ? 'You passed! XP has been awarded to your account.' : 'You need 60% to pass. Review the material and try again!'}</p>
        </div>
      `;
      document.getElementById('submitQuiz').classList.add('hidden');

      if (data.passed) {
        // Check for new badges
        await apiFetch('/api/badges/check', { method: 'POST' });
      }
    }

    async function markComplete() {
      const token = localStorage.getItem('ff_token');
      if (!token) { showToast('Please log in first.', 'error'); return; }

      const res = await apiFetch(`/api/modules/${currentSlug}/complete`, { method: 'POST' });
      const data = await res.json();
      if (res.ok) {
        showToast(`Module completed! +${data.xp_earned} XP 🎉`, 'success');
        await apiFetch('/api/badges/check', { method: 'POST' });
      }
    }

    loadModule();
  </script>
</body>
</html>
